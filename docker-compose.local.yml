services:
  postgres:
    image: postgres:18-alpine
    container_name: ex_shopify_app_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ex_shopify_app_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ex_shopify_app_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
